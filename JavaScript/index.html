<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Keyboard & Click Art</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background-color: black;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    h1 {
      position: absolute;
      top: 20px;
      width: 100%;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.8;
      animation: fadeOut 1s forwards;
    }

    @keyframes fadeOut {
      to {
        transform: scale(2);
        opacity: 0;
      }
    }
  </style>
</head>
<body tabindex="0">

<h1>Click or Press Any Key 🎹</h1>

<script src="js/script.js"></script>
</body>
</html>
