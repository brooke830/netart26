<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Pastel Quilt</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="grid">
    <div class="tile pink"></div>
    <div class="tile blue"></div>
    <div class="tile yellow"></div>
    <div class="tile green"></div>
    <div class="tile lavender"></div>

    <div class="tile blue"></div>
    <div class="tile yellow"></div>
    <div class="tile pink"></div>
    <div class="tile lavender"></div>
    <div class="tile green"></div>

    <div class="tile yellow"></div>
    <div class="tile green"></div>
    <div class="tile lavender"></div>
    <div class="tile pink"></div>
    <div class="tile blue"></div>

    <div class="tile green"></div>
    <div class="tile pink"></div>
    <div class="tile blue"></div>
    <div class="tile yellow"></div>
    <div class="tile lavender"></div>

    <div class="tile lavender"></div>
    <div class="tile yellow"></div>
    <div class="tile green"></div>
    <div class="tile blue"></div>
    <div class="tile pink"></div>
  </div>

  <!-- CLICK TO TOGGLE SUNSET MODE -->
  <script>
    document.addEventListener("click", function () {
      document.body.classList.toggle("sunset");
    });
  </script>

</body>
</html>
